<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Escolar - Vista de Enfoque (Bootstrap)</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Iconos Phosphor -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Hoja de estilos -->
    <link rel="stylesheet" href="../css/global.css">
</head>

<body class="bg-light">
    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold header-title">Panel Central</h1>
            <p class="lead text-secondary">Vista de Enfoque: Preparación Inmediata v2</p>
        </header>

        <main class="row g-4">
            <!-- Columna HOY -->
            <section class="col-md-6">
                <div class="bg-white p-4 rounded-4 h-100 shadow-sm border">
                    <header class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                        <h2 class="h4 mb-0 fw-semibold text-dark" id="title-hoy">Hoy</h2>
                        <span class="badge rounded-pill bg-light text-secondary border fw-medium px-3 py-2"
                            id="date-hoy"></span>
                    </header>
                    <div class="d-flex flex-column gap-3" id="list-hoy">
                        <!-- Las tarjetas se inyectarán aquí mediante JS -->
                    </div>
                </div>
            </section>

            <!-- Columna MAÑANA -->
            <section class="col-md-6">
                <div class="bg-white p-4 rounded-4 h-100 shadow-sm border">
                    <header class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                        <h2 class="h4 mb-0 fw-semibold text-dark" id="title-manana">Mañana</h2>
                        <span class="badge rounded-pill bg-light text-secondary border fw-medium px-3 py-2"
                            id="date-manana"></span>
                    </header>
                    <div class="d-flex flex-column gap-3" id="list-manana">
                        <!-- Las tarjetas se inyectarán aquí mediante JS -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Bootstrap Modal para Detalles de la Actividad -->
    <div class="modal fade" id="activity-modal" tabindex="-1" aria-labelledby="modal-title" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-white border-0 rounded-4 shadow">
                <div class="modal-header border-0 pb-0">
                    <div class="d-flex gap-2">
                        <span class="badge rounded-pill px-3 py-2 text-uppercase fw-semibold tag-subject"
                            id="modal-subject"></span>
                        <span
                            class="badge rounded-pill px-3 py-2 text-secondary bg-light d-flex align-items-center gap-1 border"
                            id="modal-type"></span>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-3">
                    <h2 class="h3 fw-bold mb-3 text-dark" id="modal-title"></h2>
                    <p class="text-secondary mb-4 fs-5 lh-base" id="modal-description"></p>
                    <div class="d-flex flex-column gap-2" id="modal-resources">
                        <!-- Los enlaces y materiales se inyectarán aquí -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
