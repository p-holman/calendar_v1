<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Apoderados | Colegio John Crane</title>
    <!-- Google Fonts e Iconos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
</head>

<body class="bg-light">

    <div class="container vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="w-100" style="max-width: 450px;">

            <div class="text-center mb-5">
                <i class="ph ph-graduation-cap display-1 text-primary mb-3"></i>
                <h2 class="display-6 fw-bold header-title">Colegio John Crane</h2>
            </div>

            <div class="card p-4 border-0 shadow-sm rounded-4">
                <div class="card-body">
                    <h4 class="card-title fw-bold mb-2">Acceso Apoderados</h4>
                    <p class="text-secondary mb-4">
                        Ingresa tu email para recibir un enlace de acceso instantáneo. Sin contraseñas.
                    </p>

                    <form action="/solicitar-link-acceso" method="POST">
                        <div class="mb-4">
                            <label for="email" class="form-label small fw-semibold text-secondary">Correo Electrónico</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 text-secondary"><i class="ph ph-envelope-simple fs-5"></i></span>
                                <input type="email" class="form-control form-control-lg border-start-0" id="email" name="email"
                                    placeholder="ejemplo@correo.com" required autofocus
                                    oninvalid="this.setCustomValidity('Por favor, completa este campo')"
                                    oninput="this.setCustomValidity('')">
                            </div>
                        </div>

                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary btn-lg d-flex align-items-center justify-content-center gap-2 rounded-3">
                                <span>Enviar Enlace de Acceso</span>
                                <i class="ph ph-paper-plane-right"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
